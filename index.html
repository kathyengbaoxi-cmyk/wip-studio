<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="WIP Studio"/>
<meta name="theme-color" content="#D8DFE9"/>
<title>WIP Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#D8DFE9;font-family:'Urbanist','Helvetica Neue',sans-serif;color:#212121}
::-webkit-scrollbar{width:0}
input,select,textarea{-webkit-appearance:none;appearance:none;font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:slideUp .25s cubic-bezier(.22,1,.36,1)}
.pressable:active{opacity:.7;transition:opacity .1s}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid #212121;display:inline-block;margin:0 7px;transition:background .15s}
.pin-dot.filled{background:#212121}
.pin-btn{width:72px;height:72px;border-radius:50%;border:1.5px solid #E4E8EF;background:#fff;font-size:22px;font-weight:600;font-family:'Urbanist',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#212121;transition:background .12s}
.pin-btn:active{background:#EFF0A3}
.pin-sub{font-size:8px;color:#999;letter-spacing:1.5px;margin-top:2px}
.spinner{width:20px;height:20px;border:2px solid #E4E8EF;border-top-color:#212121;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Palette ──────────────────────────────────────────────────────
var C={
  aliceBlue:"#D8DFE9",honeydew:"#CFDECA",vanilla:"#EFF0A3",
  eerieBlack:"#212121",ghostWhite:"#F6F5FA",cardBg:"#FFFFFF",
  cardBorder:"#E4E8EF",muted:"#8A93A0",mutedDark:"#5A6370",
  vanillaDark:"#C8C96E",honeydewDark:"#A8C4A2",errorRed:"#E05555"
};
var FONT="'Urbanist','Helvetica Neue',sans-serif";
var CC=["#EFF0A3","#CFDECA","#D8DFE9","#C8C96E","#A8C4A2","#B0BBCC","#9EAFBE","#D4D580","#BCCAB8","#E8E9A0","#8EA89A","#C2CDD8"];

var PAYERS=["Shop","Kathy","Hazel","Daddy"];
var PLATFORMS=["Shopee","Taobao","PDD","1688","Lazada","Grab","Others"];
var CATS=["Inventory / Supplies","Packaging","Rental","Utilities","Salary / Wages","Marketing / Ads","Transport / Petrol","Software / Subscription","Office Supplies","Equipment","Maintenance","Professional Fees","Entertainment / Client","Miscellaneous"];
var CURR=["MYR (RM)","RMB (¥)"];
var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var MONF=["January","February","March","April","May","June","July","August","September","October","November","December"];

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function td(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function pad(n){return String(n).padStart(2,"0")}
function fRM(n){return"RM "+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}
function fRMB(n){return"¥"+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}
function gMYR(e){return e.currency==="RMB (¥)"?(+e.amountMYR||0):(+e.amount||0)}
function ld(k,f){try{var v=localStorage.getItem(k);return v!=null?JSON.parse(v):f}catch(e){return f}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

function h(tag,props,kids){
  var e=document.createElement(tag);
  if(props)for(var k in props){
    if(k==="style"&&typeof props[k]==="object"){Object.assign(e.style,props[k])}
    else if(k==="cls"){e.className=props[k]}
    else if(k[0]==="o"&&k[1]==="n"){e.addEventListener(k.slice(2).toLowerCase(),props[k])}
    else e.setAttribute(k,props[k]);
  }
  if(kids!=null){var arr=Array.isArray(kids)?kids:[kids];arr.forEach(function(c){
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  })}
  return e;
}
function t(s){return document.createTextNode(String(s==null?"":s))}

// ── State ────────────────────────────────────────────────────────
var S={
  // Google Sheets config
  apiUrl: ld("wip_apiUrl","https://script.google.com/macros/s/AKfycbxAOtzyXUBQo1Gr6g6mFLegsF7pLv0EPEUQJI6C95LX67YWHczUpmvI7VYHCVpFr7ALpg/exec"),  // Web App URL
  configured: ld("wip_configured",true),
  // Auth
  unlocked:false,
  pin:ld("wip_pin",""),
  // App
  page:"dashboard",
  expenses:ld("wip_expenses_cache",[]),
  categories:ld("wip_cats",CATS),
  editId:null,
  search:"",fm:"All",fc:"All",fp:"All",fpy:"All",
  toast:null,tTimer:null,
  delTarget:null,
  viewImg:null,
  expandId:null,
  form:null,
  selM:ld("wip_sm",new Date().getMonth()),
  selY:ld("wip_sy",new Date().getFullYear()),
  // Sync state
  syncing:false,
  lastSync:ld("wip_lastSync",""),
  syncError:"",
};

function ef(){return{date:td(),description:"",paidBy:"Shop",platform:"Shopee",platformOther:"",category:S.categories[0]||CATS[0],currency:"MYR (RM)",exchangeRate:"1.7104",amount:"",amountMYR:"",notes:"",screenshots:[]}}

var app=document.getElementById("app");
function render(){var n=buildApp();var o=app.firstChild;if(o)app.replaceChild(n,o);else app.appendChild(n)}
function set(patch){Object.assign(S,patch);render()}

var IS={width:"100%",background:C.cardBg,border:"1.5px solid "+C.cardBorder,color:C.eerieBlack,borderRadius:"12px",padding:"13px 14px",fontSize:"14px",outline:"none",fontFamily:FONT};

// ── Google Sheets API ────────────────────────────────────────────
function apiCall(action,body,cb){
  if(!S.apiUrl){cb&&cb(null,"No API URL configured");return}
  var url=S.apiUrl;
  var opts={method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.assign({action:action},body||{}))};
  fetch(url,opts)
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.error)cb&&cb(null,d.error);
      else cb&&cb(d,null);
    })
    .catch(function(err){cb&&cb(null,err.toString())});
}

function syncFromSheet(){
  if(!S.apiUrl||S.syncing)return;
  set({syncing:true,syncError:""});
  apiCall("getAll",{},function(data,err){
    if(err){
      set({syncing:false,syncError:"Sync failed: "+err});
      return;
    }
    var expenses=data.expenses||[];
    sv("wip_expenses_cache",expenses);
    var now=new Date().toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit"});
    sv("wip_lastSync",now);
    set({syncing:false,expenses:expenses,lastSync:now,syncError:""});
  });
}

function saveToSheet(expense,isEdit,cb){
  var action=isEdit?"update":"save";
  apiCall(action,{expense:expense},function(data,err){
    if(err){toast("Sync failed — saved locally",true);cb&&cb(false);return}
    cb&&cb(true);
  });
}

function deleteFromSheet(id,cb){
  apiCall("delete",{id:id},function(data,err){
    if(err){toast("Delete sync failed",true);cb&&cb(false);return}
    cb&&cb(true);
  });
}

// ════════════════════════════════════════════════════════════════
function buildApp(){
  var w=h("div",{style:{minHeight:"100vh",background:C.aliceBlue,color:C.eerieBlack,fontFamily:FONT,maxWidth:"480px",margin:"0 auto",position:"relative",overflowX:"hidden"}});

  // Setup screen — if no API URL yet
  if(!S.configured){w.appendChild(buildSetup());return w}

  // PIN
  if(!S.pin){w.appendChild(buildSetPin());return w}
  if(!S.unlocked){w.appendChild(buildPinLock());return w}

  w.appendChild(buildHeader());
  var pw=h("div",{style:{padding:"0 0 110px"}});
  if(S.page==="dashboard")pw.appendChild(buildDash());
  else if(S.page==="add")pw.appendChild(buildAdd());
  else if(S.page==="monthly")pw.appendChild(buildMonthly());
  else if(S.page==="categories")pw.appendChild(buildCats());
  else if(S.page==="export")pw.appendChild(buildExport());
  w.appendChild(pw);

  if(S.page==="dashboard"){
    w.appendChild(buildNav());
    w.appendChild(h("button",{cls:"pressable",style:{position:"fixed",bottom:"82px",right:"20px",width:"54px",height:"54px",borderRadius:"50%",background:C.eerieBlack,border:"none",color:C.vanilla,fontSize:"26px",fontWeight:"900",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"101",fontFamily:FONT,boxShadow:"0 6px 24px rgba(33,33,33,.28)"},onclick:function(){set({page:"add",editId:null,form:ef()})}},"+"));
  }

  if(S.toast)w.appendChild(h("div",{style:{position:"fixed",top:"78px",right:"16px",zIndex:"999",background:S.toast.e?C.errorRed:C.eerieBlack,color:"#fff",padding:"12px 20px",borderRadius:"12px",fontWeight:"700",fontSize:"13px",animation:"toastIn .22s ease",boxShadow:"0 8px 32px rgba(0,0,0,.18)",maxWidth:"280px",fontFamily:FONT}},S.toast.m));
  if(S.delTarget)w.appendChild(buildDelModal());
  if(S.viewImg){var lb=h("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.92)",zIndex:"300",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",padding:"16px"},onclick:function(){set({viewImg:null})}});lb.appendChild(h("img",{src:S.viewImg,style:{maxWidth:"100%",maxHeight:"80vh",borderRadius:"14px",objectFit:"contain"}}));lb.appendChild(h("div",{style:{color:C.muted,marginTop:"14px",fontSize:"13px"}},"Tap to close"));w.appendChild(lb)}
  return w;
}

// ── SETUP SCREEN ─────────────────────────────────────────────────
function buildSetup(){
  var w=h("div",{style:{minHeight:"100vh",background:C.ghostWhite,display:"flex",flexDirection:"column",padding:"40px 24px"}});

  var logo=h("div",{style:{marginBottom:"32px"}});
  logo.appendChild(h("div",{style:{fontSize:"22px",fontWeight:"800",letterSpacing:"-.5px",color:C.eerieBlack}},"Work In Progress Studio"));
  logo.appendChild(h("div",{style:{fontSize:"13px",color:C.muted,marginTop:"4px"}},"First-time Setup — Connect Google Sheets"));
  w.appendChild(logo);

  // Step cards
  var steps=[
    {n:"1",title:"Open your Google Sheet",desc:"Go to Extensions → Apps Script"},
    {n:"2",title:"Paste the Apps Script code",desc:"Delete existing code, paste the code from wip-apps-script.js"},
    {n:"3",title:"Deploy as Web App",desc:"Deploy → New deployment → Execute as: Me → Who has access: Anyone → Copy the URL"},
  ];
  steps.forEach(function(s){
    var card=h("div",{style:{background:C.cardBg,border:"1px solid "+C.cardBorder,borderRadius:"16px",padding:"16px",marginBottom:"12px",display:"flex",gap:"14px",alignItems:"flex-start"}});
    card.appendChild(h("div",{style:{width:"30px",height:"30px",borderRadius:"50%",background:C.vanilla,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:"800",flexShrink:"0"}},s.n));
    var info=h("div");
    info.appendChild(h("div",{style:{fontWeight:"700",fontSize:"14px",marginBottom:"3px"}},s.title));
    info.appendChild(h("div",{style:{fontSize:"12px",color:C.muted,lineHeight:"1.5"}},s.desc));
    card.appendChild(info);
    w.appendChild(card);
  });

  // URL input
  w.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",letterSpacing:"1.5px",textTransform:"uppercase",color:C.muted,marginTop:"8px",marginBottom:"8px"}},"PASTE YOUR WEB APP URL"));
  var urlInput=h("input",{type:"url",placeholder:"https://script.google.com/macros/s/…/exec",style:Object.assign({},IS,{fontSize:"12px"})});
  urlInput.value=S.apiUrl||"";
  w.appendChild(urlInput);

  var saveBtn=h("button",{cls:"pressable",style:{width:"100%",padding:"16px",borderRadius:"12px",background:C.eerieBlack,border:"none",color:C.vanilla,fontFamily:FONT,fontWeight:"800",fontSize:"15px",cursor:"pointer",marginTop:"14px"},onclick:function(){
    var url=(urlInput.value||"").trim();
    if(!url||!url.startsWith("https://script.google.com")){toast("Please enter a valid Apps Script URL",true);return}
    sv("wip_apiUrl",url);sv("wip_configured",true);
    S.apiUrl=url;S.configured=true;
    render();
    // Auto-sync on first connect
    setTimeout(syncFromSheet,500);
  }},"Connect & Continue");
  w.appendChild(saveBtn);

  var skip=h("button",{style:{width:"100%",padding:"12px",background:"none",border:"none",color:C.muted,fontFamily:FONT,fontSize:"13px",cursor:"pointer",marginTop:"8px"},onclick:function(){
    // Allow offline / local mode
    sv("wip_configured",true);S.configured=true;render();
  }},"Skip for now — use offline mode");
  w.appendChild(skip);

  if(S.toast)w.appendChild(h("div",{style:{position:"fixed",top:"20px",right:"16px",zIndex:"999",background:S.toast.e?C.errorRed:C.eerieBlack,color:"#fff",padding:"12px 20px",borderRadius:"12px",fontWeight:"700",fontSize:"13px",animation:"toastIn .22s ease"}},S.toast.m));
  return w;
}

// ── PIN ──────────────────────────────────────────────────────────
function buildPinPad(onComplete,titleNode,subNode){
  var entered="";
  var wrap=h("div",{style:{minHeight:"100vh",background:C.ghostWhite,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}});
  wrap.appendChild(titleNode);wrap.appendChild(subNode);
  var dots=h("div",{style:{display:"flex",justifyContent:"center",marginBottom:"36px"}});
  for(var i=0;i<4;i++)dots.appendChild(h("span",{cls:"pin-dot"}));
  wrap.appendChild(dots);
  var err=h("div",{style:{color:C.errorRed,fontSize:"13px",fontWeight:"600",textAlign:"center",marginTop:"-24px",marginBottom:"18px",minHeight:"18px"}});
  wrap.appendChild(err);
  function upd(){dots.querySelectorAll(".pin-dot").forEach(function(d,i){i<entered.length?d.classList.add("filled"):d.classList.remove("filled")})}
  var grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:"14px",justifyContent:"center"}});
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(function(n){
    var btn=h("button",{cls:"pin-btn"});
    btn.appendChild(h("span",{},String(n===""?" ":n)));
    var subs={2:"ABC",3:"DEF",4:"GHI",5:"JKL",6:"MNO",7:"PQRS",8:"TUV",9:"WXYZ"};
    if(subs[n])btn.appendChild(h("span",{cls:"pin-sub"},subs[n]));
    btn.addEventListener("click",function(){
      if(n==="⌫"){entered=entered.slice(0,-1);upd();err.textContent="";return}
      if(n==="")return;if(entered.length>=4)return;
      entered+=String(n);upd();
      if(entered.length===4)onComplete(entered,err,function(){entered="";upd()});
    });
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
  return wrap;
}

function buildSetPin(){
  var title=h("div",{style:{textAlign:"center",marginBottom:"40px"}});
  title.appendChild(h("div",{style:{fontSize:"22px",fontWeight:"800",color:C.eerieBlack,marginBottom:"6px"}},"Work In Progress Studio"));
  title.appendChild(h("div",{style:{fontSize:"18px",fontWeight:"700",marginBottom:"6px"}},"Set Your PIN"));
  var sub=h("div",{style:{color:C.muted,fontSize:"14px",textAlign:"center",marginBottom:"8px"}},"Choose a 4-digit PIN");
  return buildPinPad(function(pin){sv("wip_pin",pin);S.pin=pin;S.unlocked=true;syncFromSheet();render()},title,sub);
}

function buildPinLock(){
  var title=h("div",{style:{textAlign:"center",marginBottom:"44px"}});
  title.appendChild(h("div",{style:{fontSize:"22px",fontWeight:"800",color:C.eerieBlack,marginBottom:"4px"}},"Work In Progress Studio"));
  title.appendChild(h("div",{style:{fontSize:"13px",color:C.muted}},"Business Expense Manager"));
  var sub=h("div",{style:{marginBottom:"8px"}});
  var pw=buildPinPad(function(pin,err,reset){
    if(pin===S.pin){S.unlocked=true;syncFromSheet();render()}
    else{err.textContent="Incorrect PIN. Try again.";reset()}
  },title,sub);
  var rw=h("div",{style:{textAlign:"center",marginTop:"32px"}});
  rw.appendChild(h("button",{style:{background:"none",border:"none",color:C.muted,fontSize:"12px",cursor:"pointer",fontFamily:FONT,textDecoration:"underline"},onclick:function(){if(confirm("Reset PIN?")){sv("wip_pin","");S.pin="";render()}}},"Forgot PIN? Reset"));
  pw.appendChild(rw);return pw;
}

// ── HEADER ───────────────────────────────────────────────────────
function buildHeader(){
  var hd=h("header",{style:{padding:"18px 20px 0",position:"sticky",top:"0",zIndex:"50",background:C.aliceBlue+"EE",backdropFilter:"blur(14px)"}});
  var row=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}});
  var tl=h("div");
  tl.appendChild(h("div",{style:{fontSize:"17px",fontWeight:"800",letterSpacing:".6px",lineHeight:"1.1"}},"Work In Progress Studio"));

  // Sync status
  var syncRow=h("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginTop:"3px"}});
  if(S.syncing){
    syncRow.appendChild(h("span",{cls:"spinner"}));
    syncRow.appendChild(h("span",{style:{fontSize:"10px",color:C.muted}},"Syncing…"));
  } else if(S.syncError){
    syncRow.appendChild(h("span",{style:{fontSize:"10px",color:C.errorRed}},"Sync error — offline mode"));
  } else if(S.lastSync){
    syncRow.appendChild(h("span",{style:{width:"6px",height:"6px",borderRadius:"50%",background:C.honeydewDark,flexShrink:"0",display:"inline-block"}}));
    syncRow.appendChild(h("span",{style:{fontSize:"10px",color:C.muted}},"Synced "+S.lastSync));
  } else if(!S.apiUrl){
    syncRow.appendChild(h("span",{style:{fontSize:"10px",color:C.muted}},"Offline mode"));
  }
  tl.appendChild(syncRow);
  row.appendChild(tl);

  var rightBtns=h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});
  if(S.page!=="dashboard"){
    rightBtns.appendChild(h("button",{cls:"pressable",style:{background:C.cardBg,border:"1px solid "+C.cardBorder,color:C.mutedDark,borderRadius:"10px",padding:"8px 14px",fontSize:"13px",cursor:"pointer",fontFamily:FONT,fontWeight:"600"},onclick:function(){set({page:"dashboard",editId:null,form:null})}},"← Back"));
  } else {
    // Sync button
    if(S.apiUrl){
      rightBtns.appendChild(h("button",{cls:"pressable",style:{background:C.honeydew,border:"1px solid "+C.honeydewDark,borderRadius:"8px",padding:"7px 12px",fontSize:"12px",cursor:"pointer",fontFamily:FONT,fontWeight:"700",color:C.eerieBlack},onclick:function(){syncFromSheet()}},"Sync"));
    }
    rightBtns.appendChild(h("button",{cls:"pressable",style:{background:"none",border:"none",fontSize:"14px",cursor:"pointer",padding:"4px",color:C.muted,fontFamily:FONT,fontWeight:"500"},onclick:function(){S.unlocked=false;render()}},"Lock"));
  }
  row.appendChild(rightBtns);
  hd.appendChild(row);
  hd.appendChild(h("div",{style:{height:"1px",background:"linear-gradient(90deg,"+C.vanilla+",transparent)",margin:"14px 0 0"}}));
  return hd;
}

function buildNav(){
  var nav=h("nav",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:C.ghostWhite+"F8",backdropFilter:"blur(18px)",borderTop:"1px solid "+C.cardBorder,display:"flex",alignItems:"center",justifyContent:"space-around",padding:"10px 0 max(10px,env(safe-area-inset-bottom))",zIndex:"100"}});
  [["monthly","Monthly"],["categories","Categories"],["export","Export"],["settings","Settings"]].forEach(function(item){
    var btn=h("button",{cls:"pressable",style:{background:"none",border:"none",color:C.mutedDark,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",fontSize:"9px",cursor:"pointer",fontFamily:FONT,fontWeight:"700",letterSpacing:".5px",padding:"4px 14px",textTransform:"uppercase"},onclick:function(){set({page:item[0]})}});
    btn.appendChild(t(item[1]));nav.appendChild(btn);
  });
  return nav;
}

// ── DASHBOARD ────────────────────────────────────────────────────
function getFiltered(){
  return S.expenses.filter(function(e){
    var m=parseInt((e.date||"").split("-")[1]);
    if(S.fm!=="All"&&(m-1)!==MON.indexOf(S.fm))return false;
    if(S.fc!=="All"&&e.category!==S.fc)return false;
    if(S.fp!=="All"&&e.platform!==S.fp)return false;
    if(S.fpy!=="All"&&e.paidBy!==S.fpy)return false;
    if(S.search&&(e.description||"").toLowerCase().indexOf(S.search.toLowerCase())<0&&(e.notes||"").toLowerCase().indexOf(S.search.toLowerCase())<0)return false;
    return true;
  });
}

function buildDash(){
  var fil=getFiltered();
  var tot=fil.reduce(function(s,e){return s+gMYR(e)},0);
  var w=h("div",{cls:"page"});

  // Stats grid
  var g=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",padding:"20px 16px 0"}});
  g.appendChild(sc("Filtered Total",fRM(tot),true,false));
  g.appendChild(sc("Records Shown",fil.length,false,false));
  g.appendChild(sc("Total Records",S.expenses.length,false,false));
  g.appendChild(sc("With Receipts",fil.filter(function(e){return e.screenshots&&e.screenshots.length}).length,false,true));
  w.appendChild(g);

  // Search
  var sr=h("div",{style:{position:"relative",padding:"14px 16px 0"}});
  sr.appendChild(h("span",{style:{position:"absolute",left:"29px",top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:"14px",pointerEvents:"none"}},"○"));
  var si=h("input",{type:"text",placeholder:"Search expenses…",style:Object.assign({},IS,{paddingLeft:"40px"})});
  si.value=S.search||"";si.addEventListener("input",function(){S.search=this.value;render()});
  sr.appendChild(si);w.appendChild(sr);

  // Filters
  var fr=h("div",{style:{padding:"10px 16px 4px",display:"flex",gap:"8px",overflowX:"auto"}});
  [{k:"fm",opts:["All"].concat(MON)},{k:"fc",opts:["All"].concat(S.categories)},{k:"fp",opts:["All"].concat(PLATFORMS.slice(0,-1))},{k:"fpy",opts:["All"].concat(PAYERS)}].forEach(function(fd){
    var active=S[fd.k]!=="All";

function doSave(f){
  if(!(f.description||"").trim())return toast("Please enter a description",true);
  if(!f.amount||isNaN(f.amount))return toast("Please enter a valid amount",true);
  var plat=f.platform==="Others"?(f.platformOther||"Others"):f.platform;
  var amtMYR=f.currency==="RMB (¥)"?(parseFloat(f.amount)/parseFloat(f.exchangeRate||1.7104)).toFixed(2):f.amount;
  // Don't store screenshots in sheet (too large) — store locally only
  var entry=Object.assign({},f,{platform:plat,amount:parseFloat(f.amount),amountMYR:parseFloat(amtMYR),id:S.editId||gid()});
  delete entry.platformOther;
  var sheetEntry=Object.assign({},entry);
  delete sheetEntry.screenshots; // Don't send images to sheet

  // Update local cache first
  if(S.editId){
    S.expenses=S.expenses.map(function(e){return e.id===S.editId?entry:e});
    toast("Saving…");
  } else {
    S.expenses=[entry].concat(S.expenses);
    toast("Saving…");
  }
  sv("wip_expenses_cache",S.expenses);
  set({page:"dashboard",editId:null,form:null});

  // Sync to Google Sheets
  if(S.apiUrl){
    saveToSheet(sheetEntry,!!S.editId,function(ok){
      if(ok)toast(S.editId?"Updated":"Saved");
    });
  } else {
    toast(S.editId?"Expense updated":"Expense saved");
  }
}

  prev.appendChild(ms(data.length,"Records"));prev.appendChild(ms(fRM(totMYR),"Total MYR"));prev.appendChild(ms(data.filter(function(e){return e.screenshots&&e.screenshots.length}).length,"Receipts"));
  w.appendChild(prev);
  function exb(title,desc,accent,fn){var btn=h("button",{cls:"pressable",style:{background:accent?C.eerieBlack:C.cardBg,border:"1px solid "+(accent?C.eerieBlack:C.cardBorder),borderRadius:"14px",padding:"16px 18px",display:"flex",alignItems:"center",gap:"14px",cursor:"pointer",textAlign:"left",fontFamily:FONT,width:"100%",marginBottom:"10px"}},null);var inf=h("div",{style:{flex:"1"}});inf.appendChild(h("div",{style:{fontWeight:"700",fontSize:"15px",color:accent?C.vanilla:C.eerieBlack}},title));inf.appendChild(h("div",{style:{fontSize:"12px",color:accent?"rgba(255,255,255,.6)":C.muted,marginTop:"2px"}},desc));btn.appendChild(inf);btn.appendChild(h("div",{style:{color:accent?"rgba(255,255,255,.5)":C.muted,fontSize:"14px"}},"→"));btn.addEventListener("click",fn);return btn}
  var mLabel=S.selM==="All"?"All":MON[S.selM];
  w.appendChild(exb("CSV","Comma-separated data file",false,function(){doCSV(data,mLabel,S.selY)}));

function doCSV(data,m,y){var hdr=["Date","Description","Category","Platform","Currency","Amount","Amount MYR","Paid By","Notes"];var rows=data.map(function(e){return[e.date,'"'+(e.description||"")+'"','"'+(e.category||"")+'"',e.platform,e.currency,e.amount,e.amountMYR||e.amount,e.paidBy,'"'+(e.notes||"")+'"']});var txt=[hdr].concat(rows).map(function(r){return r.join(",")}).join("\n");var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([txt],{type:"text/csv"}));a.download="WIP_"+m+"_"+y+".csv";a.click()}

function doPDF(data,m,y){ldsc("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",function(){ldsc("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js",function(){var doc=new window.jspdf.jsPDF();doc.setFillColor(239,240,163);doc.rect(0,0,210,24,"F");doc.setTextColor(33,33,33);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("WORK IN PROGRESS STUDIO",14,11);doc.setFontSize(9);doc.setFont("helvetica","normal");doc.text("Expense Report · "+m+" "+y+"  ·  Total: "+fRM(data.reduce(function(s,e){return s+gMYR(e)},0)),14,19);doc.autoTable({startY:28,head:[["Date","Description","Category","Platform","Amount","Paid By"]],body:data.map(function(e){return[e.date,(e.description||"").substring(0,28),(e.category||"").split("/")[0].trim(),e.platform,e.currency==="RMB (¥)"?"¥"+e.amount+"≈RM"+(e.amountMYR||0):"RM"+Number(e.amount).toFixed(2),e.paidBy]}),styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[239,240,163],textColor:[33,33,33],fontStyle:"bold"},alternateRowStyles:{fillColor:[246,245,250]}});doc.save("WIP_"+m+"_"+y+".pdf")})})}
function doAlbum(data,m,y){var wr=data.filter(function(e){return e.screenshots&&e.screenshots.length});if(!wr.length){alert("No receipts in selected period.");return}ldsc("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",function(){var doc=new window.jspdf.jsPDF();doc.setFillColor(239,240,163);doc.rect(0,0,210,297,"F");doc.setTextColor(33,33,33);doc.setFontSize(24);doc.setFont("helvetica","bold");doc.text("WORK IN PROGRESS STUDIO",14,70);doc.setFontSize(12);doc.setFont("helvetica","normal");doc.text("Receipt Album · "+m+" "+y,14,84);var bm={};wr.forEach(function(e){var k=(e.date||"").slice(0,7)||"?";if(!bm[k])bm[k]=[];bm[k].push(e)});Object.keys(bm).sort().forEach(function(mo){doc.addPage();doc.setFillColor(207,222,202);doc.rect(0,0,210,14,"F");doc.setTextColor(33,33,33);doc.setFontSize(10);doc.setFont("helvetica","bold");doc.text(mo,14,10);var yp=20;bm[mo].forEach(function(e){(e.screenshots||[]).forEach(function(s){if(yp>230){doc.addPage();yp=14}try{doc.addImage(s,s.indexOf("png")>=0?"PNG":"JPEG",14,yp,75,55)}catch(er){}doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(100,100,100);doc.text("Date: "+e.date,96,yp+8);doc.text("Amount: "+(e.currency==="RMB (¥)"?"¥"+e.amount+"≈RM"+(e.amountMYR||0):"RM"+Number(e.amount).toFixed(2)),96,yp+15);doc.text("Category: "+(e.category||""),96,yp+22);doc.text("Platform: "+(e.platform||""),96,yp+29);doc.text("Paid by: "+(e.paidBy||""),96,yp+36);if(e.notes)doc.text("Notes: "+(e.notes||"").substring(0,34),96,yp+43);doc.setDrawColor(220,224,228);doc.line(14,yp+60,196,yp+60);yp+=66})})});doc.save("WIP_ReceiptAlbum_"+m+"_"+y+".pdf")})}
function ldsc(src,cb){if(document.querySelector('script[src="'+src+'"]')){cb();return}var s=document.createElement("script");s.src=src;s.onload=cb;document.head.appendChild(s)}
