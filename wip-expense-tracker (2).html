<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="WIP Studio"/>
<meta name="theme-color" content="#D8DFE9"/>
<title>WIP Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#D8DFE9;font-family:'Urbanist','Helvetica Neue',sans-serif;color:#212121}
::-webkit-scrollbar{width:0}
input,select,textarea{-webkit-appearance:none;appearance:none;font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fabPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.page{animation:slideUp .25s cubic-bezier(.22,1,.36,1)}
.card:active{transform:scale(.98);transition:transform .1s}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #212121;display:inline-block;margin:0 6px;transition:background .15s}
.pin-dot.filled{background:#212121}
.pin-btn{width:72px;height:72px;border-radius:50%;border:1.5px solid #E4E8EF;background:#fff;font-size:22px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:background .1s;-webkit-tap-highlight-color:transparent}
.pin-btn:active{background:#EFF0A3}
.pin-sub{font-size:9px;color:#8A93A0;letter-spacing:1px;margin-top:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var C={aliceBlue:"#D8DFE9",honeydew:"#CFDECA",vanilla:"#EFF0A3",eerieBlack:"#212121",ghostWhite:"#F6F5FA",cardBg:"#FFFFFF",cardBorder:"#E4E8EF",muted:"#8A93A0",mutedDark:"#5A6370",vanillaDark:"#C8C96E",honeydewDark:"#A8C4A2",errorRed:"#E05555"};
var FONT="'Urbanist','Helvetica Neue',sans-serif";
var CC=["#EFF0A3","#CFDECA","#D8DFE9","#C8C96E","#A8C4A2","#B0BBCC","#9EAFBE","#D4D580","#BCCAB8","#E8E9A0","#8EA89A","#C2CDD8"];
var PAYERS=["Shop","Kathy","Hazel","Daddy"];
var PLATFORMS=["Shopee","Taobao","PDD","1688","Lazada","Grab","Others"];
var CATS=["Inventory / Supplies","Packaging","Rental","Utilities","Salary / Wages","Marketing / Ads","Transport / Petrol","Software / Subscription","Office Supplies","Equipment","Maintenance","Professional Fees","Entertainment / Client","Miscellaneous"];
var CURR=["MYR (RM)","RMB (¥)"];
var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var MONF=["January","February","March","April","May","June","July","August","September","October","November","December"];
var CEMOJI={"Inventory":"📦","Packaging":"📫","Rental":"🏠","Utilities":"💡","Salary":"💰","Marketing":"📢","Transport":"🚗","Software":"💻","Office":"🗂️","Equipment":"🔧","Maintenance":"🛠️","Professional":"⚖️","Entertainment":"🎉","Miscellaneous":"📌"};

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function td(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function pad(n){return String(n).padStart(2,"0")}
function fRM(n){return"RM "+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}
function fRMB(n){return"¥"+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}
function gMYR(e){return e.currency==="RMB (¥)"?(+e.amountMYR||0):(+e.amount||0)}
function ld(k,f){try{var v=localStorage.getItem(k);return v!=null?JSON.parse(v):f}catch(e){return f}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function cem(c){for(var k in CEMOJI){if(c&&c.indexOf(k)>=0)return CEMOJI[k]}return"🧾"}

// ── DOM helpers ──────────────────────────────────────────────────
function h(tag,props,kids){
  var e=document.createElement(tag);
  if(props)for(var k in props){
    if(k==="style"&&typeof props[k]==="object"){Object.assign(e.style,props[k])}
    else if(k==="cls"){e.className=props[k]}
    else if(k[0]==="o"&&k[1]==="n"){e.addEventListener(k.slice(2).toLowerCase(),props[k])}
    else e.setAttribute(k,props[k]);
  }
  if(kids!=null){var arr=Array.isArray(kids)?kids:[kids];arr.forEach(function(c){
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  })}
  return e;
}
function t(s){return document.createTextNode(String(s==null?"":s))}

// ── State ────────────────────────────────────────────────────────
var S={
  unlocked:false,
  pin:ld("wip_pin",""),
  page:"dashboard",
  expenses:ld("wip_expenses",[]),
  categories:ld("wip_cats",CATS),
  editId:null,
  search:"",fm:"All",fc:"All",fp:"All",fpy:"All",
  toast:null,tTimer:null,
  delTarget:null,
  viewImg:null,
  expandId:null,
  form:null,
  selM:ld("wip_sm",new Date().getMonth()),
  selY:ld("wip_sy",new Date().getFullYear()),
};
function ef(){return{date:td(),description:"",paidBy:"Shop",platform:"Shopee",platformOther:"",category:S.categories[0]||CATS[0],currency:"MYR (RM)",exchangeRate:"1.7104",amount:"",amountMYR:"",notes:"",screenshots:[]}}

var app=document.getElementById("app");
function render(){var n=buildApp();var o=app.firstChild;if(o)app.replaceChild(n,o);else app.appendChild(n)}
function set(patch){Object.assign(S,patch);render()}

// ── IS (input style) ─────────────────────────────────────────────
var IS={width:"100%",background:C.cardBg,border:"1.5px solid "+C.cardBorder,color:C.eerieBlack,borderRadius:"12px",padding:"13px 14px",fontSize:"14px",outline:"none",fontFamily:FONT};

// ════════════════════════════════════════════════════════════════
function buildApp(){
  var w=h("div",{style:{minHeight:"100vh",background:C.aliceBlue,color:C.eerieBlack,fontFamily:FONT,maxWidth:"480px",margin:"0 auto",position:"relative",overflowX:"hidden"}});
  if(!S.pin){w.appendChild(buildSetPin());return w}
  if(!S.unlocked){w.appendChild(buildPinLock());return w}
  w.appendChild(buildHeader());
  var pw=h("div",{style:{padding:"0 0 110px"}});
  if(S.page==="dashboard")pw.appendChild(buildDash());
  else if(S.page==="add")pw.appendChild(buildAdd());
  else if(S.page==="monthly")pw.appendChild(buildMonthly());
  else if(S.page==="categories")pw.appendChild(buildCats());
  else if(S.page==="export")pw.appendChild(buildExport());
  w.appendChild(pw);
  if(S.page==="dashboard"){
    w.appendChild(buildNav());
    w.appendChild(h("button",{style:{position:"fixed",bottom:"82px",right:"20px",width:"54px",height:"54px",borderRadius:"50%",background:C.eerieBlack,border:"none",color:C.vanilla,fontSize:"26px",fontWeight:"900",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 24px rgba(33,33,33,.28)",animation:"fabPulse 3s ease-in-out infinite",zIndex:"101",fontFamily:FONT},onclick:function(){set({page:"add",editId:null,form:ef()})}},"+"));
  }
  if(S.toast){w.appendChild(h("div",{style:{position:"fixed",top:"78px",right:"16px",zIndex:"999",background:S.toast.e?C.errorRed:C.eerieBlack,color:S.toast.e?"#fff":C.vanilla,padding:"12px 20px",borderRadius:"12px",fontWeight:"700",fontSize:"13px",animation:"toastIn .22s ease",boxShadow:"0 8px 32px rgba(0,0,0,.18)",maxWidth:"280px",fontFamily:FONT}},S.toast.m))}
  if(S.delTarget)w.appendChild(buildDelModal());
  if(S.viewImg){
    var lb=h("div",{style:{position:"fixed",inset:"0",background:"rgba(33,33,33,.92)",zIndex:"300",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",padding:"16px"},onclick:function(){set({viewImg:null})}});
    lb.appendChild(h("img",{src:S.viewImg,style:{maxWidth:"100%",maxHeight:"80vh",borderRadius:"14px",objectFit:"contain"}}));
    lb.appendChild(h("div",{style:{color:C.muted,marginTop:"14px",fontSize:"13px"}},"Tap to close"));
    w.appendChild(lb);
  }
  return w;
}

// ── PIN SET ──────────────────────────────────────────────────────
function buildPinPad(onComplete,titleNode,subNode){
  var entered="";
  var wrap=h("div",{style:{minHeight:"100vh",background:C.aliceBlue,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}});
  wrap.appendChild(titleNode);wrap.appendChild(subNode);
  var dots=h("div",{style:{display:"flex",justifyContent:"center",marginBottom:"32px"}});
  for(var i=0;i<4;i++)dots.appendChild(h("span",{cls:"pin-dot"}));
  wrap.appendChild(dots);
  var err=h("div",{style:{color:C.errorRed,fontSize:"13px",fontWeight:"600",textAlign:"center",marginTop:"-20px",marginBottom:"16px",minHeight:"18px"}});
  wrap.appendChild(err);
  function upd(){dots.querySelectorAll(".pin-dot").forEach(function(d,i){i<entered.length?d.classList.add("filled"):d.classList.remove("filled")})}
  var grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:"16px",justifyContent:"center"}});
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(function(n){
    var btn=h("button",{cls:"pin-btn"});
    btn.appendChild(h("span",{},String(n===""?" ":n)));
    var subs={2:"ABC",3:"DEF",4:"GHI",5:"JKL",6:"MNO",7:"PQRS",8:"TUV",9:"WXYZ"};
    if(subs[n])btn.appendChild(h("span",{cls:"pin-sub"},subs[n]));
    btn.addEventListener("click",function(){
      if(n==="⌫"){entered=entered.slice(0,-1);upd();err.textContent="";return}
      if(n==="")return;
      if(entered.length>=4)return;
      entered+=String(n);upd();
      if(entered.length===4)onComplete(entered,err,function(){entered="";upd()});
    });
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
  return wrap;
}

function buildSetPin(){
  var title=h("div",{style:{textAlign:"center",marginBottom:"32px"}});
  title.appendChild(h("div",{style:{fontSize:"32px",marginBottom:"12px"}},"🔐"));
  title.appendChild(h("div",{style:{fontWeight:"800",fontSize:"22px",marginBottom:"6px"}},"Set Your PIN"));
  var sub=h("div",{style:{color:C.muted,fontSize:"14px",marginBottom:"8px",textAlign:"center"}},"Choose a 4-digit PIN to protect your app");
  return buildPinPad(function(pin){sv("wip_pin",pin);S.pin=pin;S.unlocked=true;render()},title,sub);
}

function buildPinLock(){
  var title=h("div",{style:{textAlign:"center",marginBottom:"40px"}});
  title.appendChild(h("div",{style:{fontWeight:"800",fontSize:"20px",letterSpacing:".5px"}},"Work In Progress Studio"));
  title.appendChild(h("div",{style:{fontSize:"11px",color:C.muted,letterSpacing:"2px",textTransform:"uppercase",marginTop:"4px"}},"Business Expense Manager"));
  var sub=h("div",{style:{marginBottom:"8px"}});
  var pw=buildPinPad(function(pin,err,reset){
    if(pin===S.pin){S.unlocked=true;render();}
    else{err.textContent="Incorrect PIN. Try again.";reset();}
  },title,sub);
  var resetWrap=h("div",{style:{textAlign:"center",marginTop:"36px"}});
  var resetBtn=h("button",{style:{background:"none",border:"none",color:C.muted,fontSize:"13px",cursor:"pointer",fontFamily:FONT,textDecoration:"underline"},onclick:function(){if(confirm("Reset PIN? You'll need to set a new one.")){sv("wip_pin","");S.pin="";render()}}},"Forgot PIN? Reset");
  resetWrap.appendChild(resetBtn);
  pw.appendChild(resetWrap);
  return pw;
}

// ── HEADER ───────────────────────────────────────────────────────
function buildHeader(){
  var hd=h("header",{style:{padding:"20px 20px 0",position:"sticky",top:"0",zIndex:"50",background:C.aliceBlue+"EE",backdropFilter:"blur(14px)"}});
  var row=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}});
  var tl=h("div");
  tl.appendChild(h("div",{style:{fontSize:"17px",fontWeight:"800",letterSpacing:".6px",lineHeight:"1.1"}},"Work In Progress Studio"));
  tl.appendChild(h("div",{style:{fontSize:"10px",color:C.muted,letterSpacing:"2.4px",textTransform:"uppercase",marginTop:"3px",fontWeight:"500"}},"Business Expense Manager"));
  row.appendChild(tl);
  if(S.page!=="dashboard"){
    row.appendChild(h("button",{style:{background:C.cardBg,border:"1px solid "+C.cardBorder,color:C.mutedDark,borderRadius:"10px",padding:"8px 14px",fontSize:"13px",cursor:"pointer",fontFamily:FONT,fontWeight:"600"},onclick:function(){set({page:"dashboard",editId:null,form:null})}},"← Back"));
  } else {
    row.appendChild(h("button",{style:{background:"none",border:"none",fontSize:"20px",cursor:"pointer",padding:"4px"},onclick:function(){S.unlocked=false;render()}},"🔒"));
  }
  hd.appendChild(row);
  hd.appendChild(h("div",{style:{height:"1px",background:"linear-gradient(90deg,"+C.vanilla+",transparent)",margin:"14px 0 0"}}));
  return hd;
}

function buildNav(){
  var nav=h("nav",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:C.ghostWhite+"F8",backdropFilter:"blur(18px)",borderTop:"1px solid "+C.cardBorder,display:"flex",alignItems:"center",justifyContent:"space-around",padding:"10px 0 max(10px,env(safe-area-inset-bottom))",zIndex:"100"}});
  [["monthly","📊","Monthly"],["categories","🏷","Tags"],["export","📤","Export"]].forEach(function(item){
    var btn=h("button",{style:{background:"none",border:"none",color:C.mutedDark,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",fontSize:"10px",cursor:"pointer",fontFamily:FONT,fontWeight:"700",letterSpacing:".6px",padding:"4px 20px",textTransform:"uppercase"},onclick:function(){set({page:item[0]})}});
    btn.appendChild(h("span",{style:{fontSize:"20px"}},item[1]));btn.appendChild(t(item[2]));nav.appendChild(btn);
  });
  return nav;
}

// ── DASHBOARD ────────────────────────────────────────────────────
function getFiltered(){
  return S.expenses.filter(function(e){
    var m=parseInt((e.date||"").split("-")[1]);
    if(S.fm!=="All"&&(m-1)!==MON.indexOf(S.fm))return false;
    if(S.fc!=="All"&&e.category!==S.fc)return false;
    if(S.fp!=="All"&&e.platform!==S.fp)return false;
    if(S.fpy!=="All"&&e.paidBy!==S.fpy)return false;
    if(S.search&&(e.description||"").toLowerCase().indexOf(S.search.toLowerCase())<0&&(e.notes||"").toLowerCase().indexOf(S.search.toLowerCase())<0)return false;
    return true;
  });
}

function buildDash(){
  var fil=getFiltered();
  var tot=fil.reduce(function(s,e){return s+gMYR(e)},0);
  var w=h("div",{cls:"page"});

  var g=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",padding:"20px 16px 0"}});
  g.appendChild(sc("Filtered Total",fRM(tot),true,false));
  g.appendChild(sc("Records Shown",fil.length,false,false));
  g.appendChild(sc("Total Records",S.expenses.length,false,false));
  g.appendChild(sc("With Receipts",fil.filter(function(e){return e.screenshots&&e.screenshots.length}).length,false,true));
  w.appendChild(g);

  var sr=h("div",{style:{position:"relative",padding:"16px 16px 0"}});
  sr.appendChild(h("span",{style:{position:"absolute",left:"29px",top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:"15px",pointerEvents:"none"}},"🔍"));
  var si=h("input",{type:"text",placeholder:"Search expenses…",style:Object.assign({},IS,{paddingLeft:"40px"})});
  si.value=S.search||"";
  si.addEventListener("input",function(){S.search=this.value;render()});
  sr.appendChild(si);w.appendChild(sr);

  var fr=h("div",{style:{padding:"12px 16px 4px",display:"flex",gap:"8px",overflowX:"auto"}});
  [{k:"fm",opts:["All"].concat(MON)},{k:"fc",opts:["All"].concat(S.categories)},{k:"fp",opts:["All"].concat(PLATFORMS.slice(0,-1))},{k:"fpy",opts:["All"].concat(PAYERS)}].forEach(function(fd){
    var sel=h("select",{style:{flexShrink:"0",background:S[fd.k]!=="All"?C.vanilla:C.cardBg,border:"1px solid "+(S[fd.k]!=="All"?C.vanillaDark:C.cardBorder),color:C.eerieBlack,borderRadius:"20px",padding:"6px 14px",fontSize:"11px",fontWeight:"700",cursor:"pointer",fontFamily:FONT,maxWidth:"120px"}});
    fd.opts.forEach(function(o){var op=h("option",{},o);if(o===S[fd.k])op.selected=true;sel.appendChild(op)});
    sel.addEventListener("change",function(){var p={};p[fd.k]=this.value;set(p)});
    fr.appendChild(sel);
  });
  var hasF=S.fm!=="All"||S.fc!=="All"||S.fp!=="All"||S.fpy!=="All"||S.search;
  if(hasF){var cb=h("button",{style:{flexShrink:"0",background:"#FFE5E5",border:"1px solid #FFBBBB",borderRadius:"20px",padding:"6px 12px",color:C.errorRed,fontSize:"11px",fontWeight:"700",cursor:"pointer",fontFamily:FONT,whiteSpace:"nowrap"},onclick:function(){set({fm:"All",fc:"All",fp:"All",fpy:"All",search:""})}},"✕ Clear");fr.appendChild(cb)}
  w.appendChild(fr);

  var tx=h("div",{style:{padding:"20px 16px 0"}});
  tx.appendChild(h("div",{style:{fontWeight:"700",fontSize:"11px",letterSpacing:"2.4px",color:C.muted,textTransform:"uppercase",marginBottom:"12px"}},"Transactions"));
  if(!fil.length){
    var emp=h("div",{style:{textAlign:"center",padding:"52px 20px",color:C.muted}});
    emp.appendChild(h("div",{style:{fontSize:"40px",marginBottom:"14px"}},"🧾"));
    emp.appendChild(h("div",{style:{fontSize:"16px",fontWeight:"700",color:C.mutedDark}},"No expenses found"));
    emp.appendChild(h("div",{style:{fontSize:"13px",marginTop:"6px"}},"Tap + to add your first expense"));
    tx.appendChild(emp);
  } else {
    var list=h("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
    fil.slice(0,50).forEach(function(e){list.appendChild(buildCard(e))});
    tx.appendChild(list);
  }
  w.appendChild(tx);
  return w;
}

function sc(label,value,hi,gr){
  return h("div",{style:{background:hi?C.vanilla:gr?C.honeydew:C.cardBg,border:"1px solid "+C.cardBorder,borderRadius:"18px",padding:"16px 18px",boxShadow:"0 1px 4px rgba(33,33,33,.05)"}},[
    h("div",{style:{fontSize:"10px",fontWeight:"700",letterSpacing:"2px",color:C.mutedDark,textTransform:"uppercase",marginBottom:"6px"}},label),
    h("div",{style:{fontSize:"24px",fontWeight:"900",color:C.eerieBlack,lineHeight:"1"}},String(value))
  ]);
}

function buildCard(e){
  var open=S.expandId===e.id;
  var card=h("div",{cls:"card",style:{background:C.cardBg,border:"1px solid "+C.cardBorder,borderRadius:"18px",overflow:"hidden",cursor:"pointer",boxShadow:"0 1px 4px rgba(33,33,33,.06)"}});
  var top=h("div",{style:{padding:"14px 16px",display:"flex",alignItems:"center",gap:"12px"}});
  top.appendChild(h("div",{style:{width:"44px",height:"44px",borderRadius:"13px",background:C.honeydew,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:"0"}},cem(e.category)));
  var mid=h("div",{style:{flex:"1",minWidth:"0"}});
  mid.appendChild(h("div",{style:{fontWeight:"700",fontSize:"14px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},e.description||""));
  var meta=h("div",{style:{fontSize:"11px",color:C.muted,marginTop:"3px",display:"flex",gap:"6px",flexWrap:"wrap"}});
  meta.appendChild(t(e.date||""));meta.appendChild(t(" · "));meta.appendChild(t(e.platform||""));meta.appendChild(t(" · "));
  meta.appendChild(h("span",{style:{fontWeight:"600",color:C.vanillaDark}},e.paidBy||""));
  mid.appendChild(meta);top.appendChild(mid);
  var rt=h("div",{style:{textAlign:"right",flexShrink:"0"}});
  rt.appendChild(h("div",{style:{fontWeight:"800",fontSize:"15px"}},e.currency==="RMB (¥)"?fRMB(e.amount):fRM(e.amount)));
  if(e.currency==="RMB (¥)"&&e.amountMYR)rt.appendChild(h("div",{style:{fontSize:"10px",color:C.muted,marginTop:"1px"}},"≈ "+fRM(e.amountMYR)));
  if(e.screenshots&&e.screenshots.length)rt.appendChild(h("div",{style:{fontSize:"10px",color:C.honeydewDark,marginTop:"2px",fontWeight:"600"}},"🖼 "+e.screenshots.length));
  top.appendChild(rt);
  top.addEventListener("click",function(){set({expandId:open?null:e.id})});
  card.appendChild(top);
  if(open){
    var det=h("div",{style:{borderTop:"1px solid "+C.cardBorder,padding:"12px 16px",background:C.ghostWhite,animation:"fadeIn .18s ease"}});
    var chips=h("div",{style:{display:"flex",gap:"7px",flexWrap:"wrap",marginBottom:"10px"}});
    [e.category,e.platform].forEach(function(x){chips.appendChild(h("span",{style:{background:C.aliceBlue,border:"1px solid "+C.cardBorder,color:C.eerieBlack,borderRadius:"8px",padding:"3px 10px",fontSize:"11px",fontWeight:"600"}},x||""))});
    chips.appendChild(h("span",{style:{background:C.vanilla,border:"1px solid "+C.vanillaDark,color:C.eerieBlack,borderRadius:"8px",padding:"3px 10px",fontSize:"11px",fontWeight:"600"}},e.paidBy||""));
    det.appendChild(chips);
    if(e.notes)det.appendChild(h("div",{style:{fontSize:"12px",color:C.mutedDark,marginBottom:"10px",fontStyle:"italic",lineHeight:"1.5"}},'"'+e.notes+'"'));
    if(e.screenshots&&e.screenshots.length){
      var th=h("div",{style:{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}});
      e.screenshots.forEach(function(s){var img=h("img",{src:s,style:{width:"64px",height:"64px",objectFit:"cover",borderRadius:"10px",border:"1px solid "+C.cardBorder,cursor:"pointer"}});img.addEventListener("click",function(ev){ev.stopPropagation();set({viewImg:s})});th.appendChild(img)});
      det.appendChild(th);
    }
    var btns=h("div",{style:{display:"flex",gap:"8px"}});
    var eb=h("button",{style:{flex:"1",padding:"10px",borderRadius:"10px",background:C.vanilla,border:"none",color:C.eerieBlack,fontFamily:FONT,fontWeight:"700",cursor:"pointer",fontSize:"13px"}},"✏ Edit");
    eb.addEventListener("click",function(ev){ev.stopPropagation();openEdit(e.id)});

  }
  var mLabel=S.selM==="All"?"All":MON[S.selM];
  w.appendChild(exb("📋","CSV","Comma-separated data file",false,function(){doCSV(data,mLabel,S.selY)}));
  w.appendChild(exb("📊","Excel (.xlsx)","Spreadsheet with all fields",false,function(){doXLSX(data,mLabel,S.selY)}));
  w.appendChild(exb("📄","PDF Report","Formatted expense table",false,function(){doPDF(data,mLabel,S.selY)}));
  w.appendChild(exb("🖼️","Receipt Album","All receipts grouped by month",true,function(){doAlbum(data,mLabel,S.selY)}));
  return w;
}

function doCSV(data,m,y){var hdr=["Date","Description","Category","Platform","Currency","Amount","Amount MYR","Paid By","Notes"];var rows=data.map(function(e){return[e.date,'"'+(e.description||"")+'"','"'+(e.category||"")+'"',e.platform,e.currency,e.amount,e.amountMYR||e.amount,e.paidBy,'"'+(e.notes||"")+'"']});var txt=[hdr].concat(rows).map(function(r){return r.join(",")}).join("\n");var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([txt],{type:"text/csv"}));a.download="WIP_"+m+"_"+y+".csv";a.click()}

function doXLSX(data,m,y){ldsc("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",function(){var X=window.XLSX;var rows=[["Work In Progress Studio"],["Period: "+m+" "+y],[],["Date","Description","Category","Platform","Currency","Amount","MYR","Paid By","Notes"]].concat(data.map(function(e){return[e.date,e.description,e.category,e.platform,e.currency,e.amount,e.amountMYR||e.amount,e.paidBy,e.notes||""]})).concat([[],["Total MYR",data.reduce(function(s,e){return s+gMYR(e)},0).toFixed(2)]]);var ws=X.utils.aoa_to_sheet(rows);ws["!cols"]=[12,30,22,14,10,12,14,12,30].map(function(w){return{wch:w}});var wb=X.utils.book_new();X.utils.book_append_sheet(wb,ws,"Expenses");X.writeFile(wb,"WIP_"+m+"_"+y+".xlsx")})}

function doPDF(data,m,y){ldsc("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",function(){ldsc("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js",function(){var doc=new window.jspdf.jsPDF();doc.setFillColor(239,240,163);doc.rect(0,0,210,24,"F");doc.setTextColor(33,33,33);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("WORK IN PROGRESS STUDIO",14,11);doc.setFontSize(9);doc.setFont("helvetica","normal");doc.text("Expense Report · "+m+" "+y+"  ·  Total: "+fRM(data.reduce(function(s,e){return s+gMYR(e)},0)),14,19);doc.autoTable({startY:28,head:[["Date","Description","Category","Platform","Amount","Paid By"]],body:data.map(function(e){return[e.date,(e.description||"").substring(0,28),(e.category||"").split("/")[0].trim(),e.platform,e.currency==="RMB (¥)"?"¥"+e.amount+"≈RM"+(e.amountMYR||0):"RM"+Number(e.amount).toFixed(2),e.paidBy]}),styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[239,240,163],textColor:[33,33,33],fontStyle:"bold"},alternateRowStyles:{fillColor:[246,245,250]}});doc.save("WIP_"+m+"_"+y+".pdf")})})}

function doAlbum(data,m,y){var wr=data.filter(function(e){return e.screenshots&&e.screenshots.length});if(!wr.length){alert("No receipts in selected period.");return}ldsc("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",function(){var doc=new window.jspdf.jsPDF();doc.setFillColor(239,240,163);doc.rect(0,0,210,297,"F");doc.setTextColor(33,33,33);doc.setFontSize(28);doc.setFont("helvetica","bold");doc.text("WORK IN PROGRESS",14,70);doc.text("STUDIO",14,86);doc.setFontSize(14);doc.setFont("helvetica","normal");doc.text("Receipt Album",14,102);doc.setFontSize(10);doc.text(m+" "+y+"  ·  "+wr.length+" receipts",14,114);var bm={};wr.forEach(function(e){var k=(e.date||"").slice(0,7)||"?";if(!bm[k])bm[k]=[];bm[k].push(e)});Object.keys(bm).sort().forEach(function(mo){doc.addPage();doc.setFillColor(207,222,202);doc.rect(0,0,210,16,"F");doc.setTextColor(33,33,33);doc.setFontSize(12);doc.setFont("helvetica","bold");doc.text(mo,14,11);var yp=22;bm[mo].forEach(function(e){(e.screenshots||[]).forEach(function(s){if(yp>230){doc.addPage();yp=14}try{doc.addImage(s,s.indexOf("png")>=0?"PNG":"JPEG",14,yp,75,55)}catch(er){}doc.setFontSize(8);doc.setFont("helvetica","normal");doc.text("Date: "+e.date,96,yp+8);doc.text("Amount: "+(e.currency==="RMB (¥)"?"¥"+e.amount+"≈RM"+(e.amountMYR||0):"RM"+Number(e.amount).toFixed(2)),96,yp+15);doc.text("Category: "+(e.category||""),96,yp+22);doc.text("Platform: "+(e.platform||""),96,yp+29);doc.text("Paid by: "+(e.paidBy||""),96,yp+36);if(e.notes)doc.text("Notes: "+(e.notes||"").substring(0,34),96,yp+43);doc.setDrawColor(220,224,228);doc.line(14,yp+60,196,yp+60);yp+=66})})});doc.save("WIP_ReceiptAlbum_"+m+"_"+y+".pdf")})}

function ldsc(src,cb){if(document.querySelector('script[src="'+src+'"]')){cb();return}var s=document.createElement("script");s.src=src;s.onload=cb;document.head.appendChild(s)}

render();
</script>
